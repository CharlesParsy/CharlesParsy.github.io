<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des questions</title>
    <link rel="icon" type="image/x-icon" href="logo.svg">
    <link rel="stylesheet" href="style2.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <script type="module">
        // 🔒 Vérifie la connexion admin
        if (localStorage.getItem("adminConnected") !== "true") {
            window.location.href = "login.html";
        }

        import { logout, getQuestionsByCategory, loadCategories, deleteCategory, renameCategory, addQuestionWithCategory } from "./script.js";

        document.getElementById("importExcelBtn").addEventListener("click", () => {
            const fileInput = document.getElementById("excelFile");

            if (!fileInput.files.length) {
                alert("Sélectionne un fichier Excel !");
                return;
            }

            const reader = new FileReader();

            reader.onload = async function (e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: "array" });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

                const clean = txt => (typeof txt === "string" ? txt.replace(/\r/g, "").trim() : "");

                for (let i = 2; i < rows.length; i++) {
                    const categorie = clean(rows[i][1]);
                    const question = clean(rows[i][2]);
                    const propositionsBrutes = rows[i][3];  // on nettoie plus bas
                    const bonneReponse = clean(rows[i][4]);
                    const solution = clean(rows[i][5]);

                    if (!categorie || !question || !propositionsBrutes) continue;

                    const propositions = propositionsBrutes
                        .split("\n")
                        .map(p => clean(p))
                        .filter(p => p !== "");

                    const mauvaisesReponses = propositions.filter(p => p !== bonneReponse);

                    await addQuestionWithCategory({
                        categorie,
                        intitule: question,
                        reponse: bonneReponse,
                        propositions: mauvaisesReponses,
                        solution
                    });
                }

                alert("Import terminé !");
            };
            reader.readAsArrayBuffer(fileInput.files[0]);
        });

        document.addEventListener("DOMContentLoaded", async () => {
            const select = document.getElementById("categorie");
            const listDiv = document.getElementById("list");
            const renameInput = document.getElementById("renameCatInput");
            const renameBtn = document.getElementById("renameCatBtn");

            // 🔹 Charger les catégories
            async function refreshCategories() {
                const categories = await loadCategories();
                select.innerHTML = "<option value=''>-- Sélectionnez une catégorie --</option>";
                if (categories) {
                    categories.forEach(cat => {
                        const opt = document.createElement("option");
                        opt.value = cat;
                        opt.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
                        select.appendChild(opt);
                    });
                }
            }

            await refreshCategories();

            // 🔹 Afficher les questions lors de la sélection d’une catégorie
            select.addEventListener("change", async () => {
                const cat = select.value;
                listDiv.innerHTML = "";
                if (!cat) return;

                const questions = await getQuestionsByCategory(cat);
                if (!questions || questions.length === 0) {
                    listDiv.textContent = "Aucune question trouvée dans cette catégorie.";
                    return;
                }

                questions.forEach(q => {
                    const div = document.createElement("div");
                    div.className = "question-item";
                    div.innerHTML = `
                        <p><strong>${q.intitule}</strong></p>
                        <p><em>Réponse :</em> ${q.reponse}</p>
                        <button class="modifier">Modifier</button>
                        <button class="supprimer">Supprimer</button>
                        <hr>
                    `;

                    div.querySelector(".modifier").addEventListener("click", () => {
                        localStorage.setItem("editCat", cat);
                        localStorage.setItem("editId", q.id);
                        window.location.href = "modifier.html";
                    });

                    div.querySelector(".supprimer").addEventListener("click", async () => {
                        if (confirm("Supprimer cette question ?")) {
                            await deleteDoc(doc(db, cat, q.id));
                            div.remove();
                        }
                    });

                    listDiv.appendChild(div);
                });
            });

            // 🔹 Supprimer la catégorie
            document.getElementById("deleteCatBtn").addEventListener("click", async () => {
                const cat = select.value;
                if (!cat) return alert("Veuillez sélectionner une catégorie à supprimer !");
                if (!confirm(`Supprimer la catégorie "${cat}" et toutes ses questions ?`)) return;

                try {
                    await deleteCategory(cat);
                    alert(`Catégorie "${cat}" supprimée avec succès !`);
                    await refreshCategories();
                    listDiv.innerHTML = "";
                } catch (e) {
                    console.error(e);
                    alert("Erreur lors de la suppression de la catégorie !");
                }
            });

            // 🔹 Renommer la catégorie
            renameBtn.addEventListener("click", async () => {
                const oldCat = select.value;
                const newCat = renameInput.value.trim();
                if (!oldCat) return alert("Veuillez sélectionner une catégorie à renommer !");
                if (!newCat) return alert("Veuillez saisir le nouveau nom !");
                if (oldCat === newCat) return alert("Le nouveau nom est identique à l'ancien !");

                if (!confirm(`Renommer la catégorie "${oldCat}" en "${newCat}" ?`)) return;

                try {
                    await renameCategory(oldCat, newCat);
                    alert(`Catégorie renommée en "${newCat}" avec succès !`);
                    await refreshCategories();
                    listDiv.innerHTML = "";
                    renameInput.value = "";
                } catch (e) {
                    console.error(e);
                    alert("Erreur lors du renommage de la catégorie !");
                }
            });

            document.getElementById("logoutBtn").addEventListener("click", logout);
        });
    </script>
</head>

<body>
<a class="logoA" href="index.html"><img class="logo" src="logo.svg"></a>

<h1>Liste des questions</h1>
<br><br>
<div>
    <input type="file" id="excelFile" accept=".xlsx">
    <button id="importExcelBtn">Importer les questions</button>
</div>

<a href="ajout.html">Ajouter une question ou une catégorie</a>

<div>
    <label for="categorie"><strong>Catégorie :</strong></label>
    <select id="categorie"></select>
    <button id="deleteCatBtn">Supprimer la catégorie</button>
    <input type="text" id="renameCatInput" placeholder="Nouveau nom de catégorie">
    <button id="renameCatBtn">Renommer la catégorie</button>
</div>

<div id="list"></div>
<p id="message"></p>
<button id="logoutBtn">Se déconnecter</button>
</body>
</html>
