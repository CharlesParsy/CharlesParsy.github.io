<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
    <title>Import Questions Firestore</title>
</head>
<body>
<h1>Importer des questions en masse</h1>

<input type="file" id="fileInput" accept=".json">
    <button id="importBtn">Importer</button>

    <pre id="log"></pre>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ Mets ta config Firebase ici
        const firebaseConfig = {
            apiKey: "AIzaSyBrsi_SS-Tz02U5jYFgYTPEJVYywqS14wc",
            authDomain: "testquiz-6c8b7.firebaseapp.com",
            projectId: "testquiz-6c8b7",
            storageBucket: "testquiz-6c8b7.firebasestorage.app",
            messagingSenderId: "166793498577",
            appId: "1:166793498577:web:ff371eb47f556922d49af0",
            measurementId: "G-E2DEX1Z7J3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const log = (t) => document.getElementById("log").textContent += t + "\n";

        document.getElementById("importBtn").onclick = async () => {
        const file = document.getElementById("fileInput").files[0];
        if (!file) {
        alert("Choisis un fichier JSON !");
        return;
    }

        const text = await file.text();
        const data = JSON.parse(text);

        log("Import commencé…");

        for (const [collectionName, docs] of Object.entries(data)) {
        for (const [docId, docData] of Object.entries(docs)) {

        await setDoc(doc(db, collectionName, docId), docData);

        log(`✔️ ${collectionName}/${docId} importé`);
    }
    }

        log("\n🎉 Import terminé !");
        alert("Import terminé !");
    };
    </script>
</body>
</html>
